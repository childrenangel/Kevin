<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sistema de Donaciones</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">🩸</div>
      <h1>Sistema de Donaciones</h1>
      <p class="login-subtitle">Inicia sesión para continuar</p>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" placeholder="admin@demo.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Iniciar sesión
        </button>
      </form>

      <p class="login-hint">
        Cuentas de prueba: <code>admin@demo.com</code> / <code>admin123</code>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
